services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: xx
      POSTGRES_PASSWORD: xx
      POSTGRES_DB: xx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xx -d xx"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    restart: always
    env_file:
      - ./backend/.prod.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    restart: always
    env_file:
      - ./frontend/.prod.env

  api_gateway:
    build:
      context: ./api_gateway
      dockerfile: dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run --token XX
    depends_on:
      - api_gateway

volumes:
  postgres_data:
